name: LR3 Stream
slug: lr3_stream
version: "0.3.0"
description: Stabilní lokální stream (Icecast + Liquidsoap) se Spotify Connect a volitelným fallbackem
url: https://github.com/vlioscz/LR3-stream-addon
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
init: false

options:
  port: 8121
  source_password: "changeme"
  bitrate: 192
  spotify_bitrate: 320
  fallback_enabled: true
  fallback_url: "http://ice.actve.net/fm-evropa2-128"
  fallback_delay: 15
  zones:
    - name: "Všude"
      mount: vsude

schema:
  port: int
  source_password: password
  bitrate: int
  spotify_bitrate: list(96|160|320)
  fallback_enabled: bool
  fallback_url: str
  fallback_delay: int
  zones:
    - name: str
      mount: str
