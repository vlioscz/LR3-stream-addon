configuration:
  port:
    name: Port
    description: >-
      Port the local stream (Icecast) listens on. The stream address is
      http://<HA-IP>:<port>/<mount>. Exact URLs are printed to the add-on log
      after start.
  source_password:
    name: Source password (internal)
    description: >-
      Internal Icecast password Liquidsoap uses to publish the stream, and the
      Icecast admin password. Listeners / radios do NOT need it — listening is
      open and passwordless. You can leave the default; change it only to secure
      the Icecast admin page or to stop other devices on your LAN from pushing
      audio into your Icecast.
  bitrate:
    name: Output bitrate (kbps)
    description: Bitrate of the MP3 stream sent to radios, in kbps (e.g. 128, 192, 320).
  spotify_bitrate:
    name: Spotify quality (kbps)
    description: >-
      Spotify Connect (librespot) streaming quality: 96, 160 or 320 kbps.
      Requires a Spotify Premium account.
  fallback_enabled:
    name: Fallback radio enabled
    description: >-
      On: the fallback online radio starts after the Spotify idle delay. Off:
      the stream stays silent after the delay and the LARA radios are turned off.
  fallback_url:
    name: Fallback radio URL
    description: >-
      Online radio that plays as a fallback when Spotify is not playing.
  fallback_delay:
    name: Fallback delay (s)
    description: >-
      Seconds of silence (Spotify idle) before the fallback radio kicks in.
  control_mode:
    name: LARA radio control
    description: >-
      off = only discover and log radios (default, never switches). preset = LARA
      tunes to our stream as one of its stored radio presets (select_station).
      slimproto = we push the stream to LARA via a SlimProto server (:3483). Turn
      preset/slimproto on only once a real LARA is present.
  lara_username:
    name: LARA username
    description: Login name for the LARA radios (default "admin").
  lara_password:
    name: LARA password
    description: Password for the LARA radios (default "elkoep").
  lara_hosts:
    name: LARA manual IPs
    description: >-
      Optional list of LARA IP addresses for when auto-discovery (UDP broadcast)
      cannot find them — e.g. on a different subnet.
  zones:
    name: Manual streams
    description: >-
      Optional extra streams you manage yourself (add or delete freely) — they may
      serve purposes other than LARA. The "Default" stream and the streams for
      discovered LARA radios are created automatically, are not listed here, and
      cannot be deleted. Each has a name (= its Spotify Connect device name) and a
      mount (the last part of the URL): http://<HA-IP>:<port>/<mount>. The mount
      "default" is reserved.
