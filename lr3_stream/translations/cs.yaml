configuration:
  port:
    name: Port
    description: >-
      Port, na kterém poslouchá lokální stream (Icecast). Adresa streamu je
      http://<IP-HA>:<port>/<mount>. Přesné adresy addon vypíše do logu po startu.
  source_password:
    name: Heslo zdroje (interní)
    description: >-
      Interní heslo Icecastu, kterým Liquidsoap publikuje stream, a heslo do
      Icecast admin stránky. Posluchači / rádia ho NEPOTŘEBUJÍ — poslech je
      volný, bez hesla. Klidně nech výchozí; měň jen když chceš zabezpečit
      Icecast admin stránku nebo zabránit jiným zařízením na síti, aby tlačila
      zvuk do tvého Icecastu.
  bitrate:
    name: Výstupní bitrate (kbps)
    description: Bitrate MP3 streamu posílaného do rádií, v kbps (např. 128, 192, 320).
  spotify_bitrate:
    name: Kvalita Spotify (kbps)
    description: >-
      Kvalita streamu ze Spotify Connect (librespot): 96, 160 nebo 320 kbps.
      Vyžaduje Spotify Premium účet.
  fallback_enabled:
    name: Záložní rádio zapnuté
    description: >-
      Zapnuto: po prodlevě nečinnosti Spotify naskočí do streamu záložní online
      rádio. Vypnuto: po prodlevě zůstane ticho a LARA rádia se vypnou (OFF).
  fallback_url:
    name: URL záložního rádia
    description: >-
      Online rádio, které hraje jako záloha, když Spotify nehraje.
  fallback_delay:
    name: Prodleva zálohy (s)
    description: >-
      Sekundy ticha (Spotify nehraje), než naskočí záložní rádio.
  zones:
    name: Zóny
    description: >-
      Zóny streamu. Každá má název (slouží i jako jméno Spotify Connect zařízení)
      a mount (poslední část URL). Jedna zóna = jedna adresa streamu
      http://<IP-HA>:<port>/<mount> a jedno Spotify zařízení.
