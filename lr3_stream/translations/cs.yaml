configuration:
  port:
    name: Port
    description: >-
      Port, na kterém poslouchá lokální stream (Icecast). Adresa streamu je
      http://<IP-HA>:<port>/<mount>. Přesné adresy addon vypíše do logu po startu.
  source_password:
    name: Heslo zdroje (interní)
    description: >-
      Interní heslo Icecastu, kterým Liquidsoap publikuje stream, a heslo do
      Icecast admin stránky. Posluchači / rádia ho NEPOTŘEBUJÍ — poslech je
      volný, bez hesla. Klidně nech výchozí; měň jen když chceš zabezpečit
      Icecast admin stránku nebo zabránit jiným zařízením na síti, aby tlačila
      zvuk do tvého Icecastu.
  bitrate:
    name: Výstupní bitrate (kbps)
    description: Bitrate MP3 streamu posílaného do rádií, v kbps (např. 128, 192, 320).
  spotify_bitrate:
    name: Kvalita Spotify (kbps)
    description: >-
      Kvalita streamu ze Spotify Connect (librespot): 96, 160 nebo 320 kbps.
      Vyžaduje Spotify Premium účet.
  fallback_enabled:
    name: Záložní rádio zapnuté
    description: >-
      Zapnuto: po prodlevě nečinnosti Spotify naskočí do streamu záložní online
      rádio. Vypnuto: po prodlevě zůstane ticho a LARA rádia se vypnou (OFF).
  fallback_url:
    name: URL záložního rádia
    description: >-
      Online rádio, které hraje jako záloha, když Spotify nehraje.
  fallback_delay:
    name: Prodleva zálohy (s)
    description: >-
      Sekundy ticha (Spotify nehraje), než naskočí záložní rádio.
  control_mode:
    name: Ovládání LARA rádií
    description: >-
      off = jen najít rádia a vypsat je do logu (výchozí, nic nepřepíná).
      preset = LARA naladí náš stream jako svůj uložený rádio preset
      (select_station). slimproto = pushujeme stream do LARA přes SlimProto
      server (:3483). Režimy preset/slimproto zapni až s reálnou LARA.
  lara_username:
    name: LARA — uživatel
    description: Přihlašovací jméno k LARA rádiím (výchozí „admin").
  lara_password:
    name: LARA — heslo
    description: Heslo k LARA rádiím (výchozí „elkoep").
  lara_hosts:
    name: LARA — ruční IP
    description: >-
      Volitelný seznam IP adres LARA rádií pro případ, že je automatické hledání
      (UDP broadcast) nenajde — např. když jsou v jiné podsíti.
  zones:
    name: Ruční streamy
    description: >-
      Volitelné streamy navíc, které si spravuješ sám (jdou přidávat i mazat) —
      klidně i pro jiné využití než pro LARA. Výchozí stream „Default" a streamy
      pro nalezená LARA rádia vznikají automaticky, v tomto seznamu nejsou a
      smazat je nelze. Každý má název (= jméno Spotify Connect zařízení) a mount
      (poslední část URL): http://<IP-HA>:<port>/<mount>. Mount „default" je
      rezervovaný.
